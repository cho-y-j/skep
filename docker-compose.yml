  # ==========================================
  # Frontend
  # ==========================================
  frontend:
    build:
      context: ./frontend/skep_app
      dockerfile: Dockerfile
    container_name: skep-frontend
    environment:
      FLUTTER_BUILD_MODE: ${FLUTTER_BUILD_MODE:-debug}
      API_BASE_URL: http://localhost:8080
      DOMAIN: ${DOMAIN:-skep.on1.kr}
    ports:
      - "${FRONTEND_PORT:-9000}:80"
    depends_on:
      - api-gateway
    networks:
      - skep-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  skep-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
