spring:
  application:
    name: location-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skep_location}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        jdbc:
          batch_size: 20
  flyway:
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8088
  servlet:
    context-path: /

logging:
  level:
    org.springframework: INFO
    com.skep: DEBUG
