name: CI

on:
  push:
    branches:
      - develop
      - main
  pull_request:
    branches:
      - main
      - develop

jobs:
  test-java-services:
    name: Build & Test Java Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - document-service
          - equipment-service
          - dispatch-service
          - inspection-service
          - settlement-service
          - notification-service
          - location-service
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Build ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: gradle build -x test --no-daemon

      - name: Test ${{ matrix.service }}
        working-directory: services/${{ matrix.service }}
        run: gradle test --no-daemon --continue || true
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.service }}
          path: services/${{ matrix.service }}/build/reports/tests/
          retention-days: 30

  test-node-services:
    name: Test Node.js Mock Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - ocr-service
          - govapi-service
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: npm install

      - name: Validate server starts
        working-directory: services/${{ matrix.service }}
        run: |
          timeout 10 node server.js &
          sleep 3
          curl -f http://localhost:3000/health || curl -f http://localhost:3001/health || true
          kill %1 || true
        continue-on-error: true

  test-flutter:
    name: Test Flutter Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          cache: true

      - name: Get Flutter dependencies
        working-directory: frontend/skep_app
        run: flutter pub get

      - name: Analyze code
        working-directory: frontend/skep_app
        run: flutter analyze
        continue-on-error: true

      - name: Build web
        working-directory: frontend/skep_app
        run: flutter build web --release
        continue-on-error: true

  docker-build-validation:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway
          - service: auth-service
            context: services/auth-service
          - service: document-service
            context: services/document-service
          - service: equipment-service
            context: services/equipment-service
          - service: dispatch-service
            context: services/dispatch-service
          - service: inspection-service
            context: services/inspection-service
          - service: settlement-service
            context: services/settlement-service
          - service: notification-service
            context: services/notification-service
          - service: location-service
            context: services/location-service
          - service: ocr-service
            context: services/ocr-service
          - service: govapi-service
            context: services/govapi-service
          - service: frontend
            context: frontend/skep_app
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker build for ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/Dockerfile
          push: false
          tags: skep-${{ matrix.service }}:ci-validation
          cache-from: type=gha
          cache-to: type=gha,mode=max
        continue-on-error: true

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
        continue-on-error: true

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: [test-java-services, test-node-services, test-flutter, docker-build-validation]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          echo "Java services: ${{ needs.test-java-services.result }}"
          echo "Node services: ${{ needs.test-node-services.result }}"
          echo "Flutter: ${{ needs.test-flutter.result }}"
          echo "Docker validation: ${{ needs.docker-build-validation.result }}"
          if [ "${{ needs.test-java-services.result }}" = "failure" ]; then
            echo "Java services build FAILED"
            exit 1
          fi
          echo "CI pipeline completed successfully"
