name: Deploy to Dev

on:
  push:
    branches:
      - develop
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: services/api-gateway
          - service: auth-service
            context: services/auth-service
          - service: document-service
            context: services/document-service
          - service: equipment-service
            context: services/equipment-service
          - service: dispatch-service
            context: services/dispatch-service
          - service: inspection-service
            context: services/inspection-service
          - service: settlement-service
            context: services/settlement-service
          - service: notification-service
            context: services/notification-service
          - service: location-service
            context: services/location-service
          - service: ocr-service
            context: services/ocr-service
          - service: govapi-service
            context: services/govapi-service
          - service: frontend
            context: frontend/skep_app
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHub-Actions-${{ matrix.service }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: short_sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.context }}
          file: ./${{ matrix.context }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:${{ steps.short_sha.outputs.sha_short }}
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:buildcache,mode=max

      - name: Print pushed image
        run: |
          echo "Pushed: ${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:${{ steps.short_sha.outputs.sha_short }}"

  deploy-to-ecs:
    name: Deploy to ECS (dev)
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHub-Actions-ECS-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Force new ECS deployments
        run: |
          CLUSTER="skep-cluster-dev"
          SERVICES=(
            skep-api-gateway-dev
            skep-auth-service-dev
            skep-document-service-dev
            skep-equipment-service-dev
            skep-dispatch-service-dev
            skep-inspection-service-dev
            skep-settlement-service-dev
            skep-notification-service-dev
            skep-location-service-dev
            skep-frontend-dev
          )
          for svc in "${SERVICES[@]}"; do
            echo "Updating ECS service: $svc"
            aws ecs update-service \
              --cluster $CLUSTER \
              --service $svc \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }} || true
          done

      - name: Wait for critical services to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster skep-cluster-dev \
            --services skep-api-gateway-dev skep-auth-service-dev skep-frontend-dev \
            --region ${{ env.AWS_REGION }}
        timeout-minutes: 10

  notify:
    name: Notify Deployment Result
    runs-on: ubuntu-latest
    needs: deploy-to-ecs
    if: always()

    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy-to-ecs.result }}" = "success" ]; then
            echo "✅ Dev deployment completed successfully"
          else
            echo "❌ Dev deployment failed - result: ${{ needs.deploy-to-ecs.result }}"
            exit 1
          fi
