spring:
  application:
    name: document-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skep_document}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: true
    locations: classpath:db/migration
    schemas: public

server:
  port: 8082
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: INFO
    com.skep.documentservice: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

aws:
  s3:
    bucket-name: skep-documents
    region: ap-northeast-2
    endpoint: http://localhost:9000
    access-key-id: ${S3_ACCESS_KEY:minioadmin}
    secret-access-key: ${S3_SECRET_KEY:minioadmin}
    use-path-style: true

verify:
  server-url: ${VERIFY_SERVER_URL:http://verify-main-api:8080}
  api-key: ${VERIFY_API_KEY:}
  timeout: 30000

scheduler:
  expiry-check:
    enabled: true
    cron: "0 0 * * * ?"
    days-threshold: 30
