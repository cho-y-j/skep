spring:
  application:
    name: document-service

  mail:
    host: ${MAIL_HOST:smtp.naver.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
            trust: ${MAIL_HOST:smtp.naver.com}
          starttls:
            enable: false
          timeout: 15000
          connectiontimeout: 15000
          writetimeout: 15000

  servlet:
    multipart:
      max-file-size: ${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:20MB}
      max-request-size: ${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:20MB}

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:skep_document}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20

  flyway:
    enabled: true
    baseline-on-migrate: true
    clean-on-validation-error: true
    locations: classpath:db/migration
    schemas: public

server:
  port: 8082
  servlet:
    context-path: /
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: INFO
    com.skep.documentservice: DEBUG
    org.springframework.web: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

aws:
  s3:
    bucket-name: skep-documents
    region: ap-northeast-2
    endpoint: http://localhost:9000
    access-key-id: ${S3_ACCESS_KEY:minioadmin}
    secret-access-key: ${S3_SECRET_KEY:minioadmin}
    use-path-style: true

verify:
  api:
    base-url: ${VERIFY_API_BASE_URL:https://sk.on1.kr}
    email: ${VERIFY_API_EMAIL:_skep_internal_svc_7f3a@system.local}
    password: ${VERIFY_API_PASSWORD:Xk9mN2vRpL5wQ8jF1@@}
    timeout: 30000

scheduler:
  expiry-check:
    enabled: true
    cron: "0 0 * * * ?"
    days-threshold: 30
