version: '3.8'

services:
  # ==========================================
  # Database & Cache Services
  # ==========================================
  postgres:
    image: postgis/postgis:16-3.4
    container_name: skep-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-skep_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me}
      POSTGRES_DB: ${DB_NAME:-skep_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    command: postgres -c max_connections=200
    ports:
      - "${DB_EXTERNAL_PORT:-15433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - skep-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-skep_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: skep-redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_EXTERNAL_PORT:-16379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - skep-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Mock External Services
  # ==========================================
  ocr-service:
    build:
      context: ./services/ocr-service
      dockerfile: Dockerfile
    container_name: skep-ocr-service
    environment:
      NODE_ENV: ${ENVIRONMENT:-dev}
      PORT: ${OCR_SERVICE_PORT:-9089}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${OCR_SERVICE_PORT:-9089}:${OCR_SERVICE_PORT:-9089}"
    networks:
      - skep-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:${OCR_SERVICE_PORT:-9089}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  govapi-service:
    build:
      context: ./services/govapi-service
      dockerfile: Dockerfile
    container_name: skep-govapi-service
    environment:
      NODE_ENV: ${ENVIRONMENT:-dev}
      PORT: ${GOVAPI_SERVICE_PORT:-9090}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    ports:
      - "${GOVAPI_SERVICE_PORT:-9090}:${GOVAPI_SERVICE_PORT:-9090}"
    networks:
      - skep-network
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://localhost:${GOVAPI_SERVICE_PORT:-9090}/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ==========================================
  # Spring Boot Microservices
  # ==========================================
  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    container_name: skep-api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: ${ENVIRONMENT:-dev}
      SERVER_PORT: ${API_GATEWAY_PORT:-8080}
      SERVER_SERVLET_CONTEXT_PATH: /

      # Database
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-skep_db}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME:-skep_user}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD:-change_me}
      SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: ${DB_POOL_SIZE:-20}

      # Redis
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST:-redis}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT:-6379}
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-}

      # JWT
      JWT_SECRET: ${JWT_SECRET:-your-256bit-base64-encoded-secret-key-here}
      JWT_EXPIRATION: ${JWT_EXPIRATION_HOURS:-24}

      # AWS
      AWS_REGION: ${AWS_REGION:-ap-northeast-2}
      AWS_S3_BUCKET: ${AWS_S3_BUCKET:-skep-documents-dev}

      # Services
      OCR_SERVICE_URL: ${OCR_SERVICE_URL:-http://ocr-service:9089}
      GOVAPI_SERVICE_URL: ${GOVAPI_SERVICE_URL:-http://govapi-service:9090}

      # Logging
      LOGGING_LEVEL_ROOT: ${LOG_LEVEL:-INFO}

    ports:
      - "${API_GATEWAY_PORT:-9080}:${API_GATEWAY_PORT:-9080}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skep-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${API_GATEWAY_PORT:-8080}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  auth-service:
