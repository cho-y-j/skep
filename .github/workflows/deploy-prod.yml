name: Deploy to Prod

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.ap-northeast-2.amazonaws.com

permissions:
  id-token: write
  contents: read

jobs:
  approval:
    name: Request Approval
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval granted for production deployment
        run: echo "Production deployment approved"

  build-and-push:
    name: Build and Push to ECR
    runs-on: ubuntu-latest
    needs: approval
    strategy:
      matrix:
        service:
          - api-gateway
          - auth-service
          - document-service
          - equipment-service
          - dispatch-service
          - inspection-service
          - settlement-service
          - notification-service
          - location-service
          - ocr-service
          - govapi-service
          - frontend
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHub-Actions-${{ matrix.service }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Get short SHA
        id: short_sha
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image for ${{ matrix.service }}
        uses: docker/build-push-action@v4
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:latest
            ${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:${{ steps.short_sha.outputs.sha_short }}
            ${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:prod
          cache-from: type=registry,ref=${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:buildcache
          cache-to: type=registry,ref=${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:buildcache,mode=max

      - name: Image scan results
        run: |
          echo "Image pushed: ${{ env.ECR_REGISTRY }}/skep-${{ matrix.service }}:${{ steps.short_sha.outputs.sha_short }}"

  deploy-to-ecs:
    name: Deploy to ECS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: success()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          role-session-name: GitHub-Actions-Deploy
          aws-region: ${{ env.AWS_REGION }}

      - name: Update ECS service - API Gateway
        run: |
          aws ecs update-service \
            --cluster skep-cluster-prod \
            --service skep-api-gateway-prod \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Update ECS service - Frontend
        run: |
          aws ecs update-service \
            --cluster skep-cluster-prod \
            --service skep-frontend-prod \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API Gateway deployment
        run: |
          aws ecs wait services-stable \
            --cluster skep-cluster-prod \
            --services skep-api-gateway-prod \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Frontend deployment
        run: |
          aws ecs wait services-stable \
            --cluster skep-cluster-prod \
            --services skep-frontend-prod \
            --region ${{ env.AWS_REGION }}

  notify:
    name: Notify Deployment
    runs-on: ubuntu-latest
    needs: deploy-to-ecs
    if: always()

    steps:
      - name: Deployment status
        run: |
          if [ "${{ needs.deploy-to-ecs.result }}" = "success" ]; then
            echo "Deployment to PROD completed successfully"
          else
            echo "Deployment to PROD failed"
            exit 1
          fi

      - name: Send Slack notification on success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "SKEP Production Deployment Successful",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "✅ *Production Deployment Successful*\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Send Slack notification on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "SKEP Production Deployment Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "❌ *Production Deployment Failed*\n*Commit:* ${{ github.sha }}\n*Branch:* ${{ github.ref }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true
