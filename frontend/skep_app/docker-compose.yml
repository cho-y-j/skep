version: '3.8'

services:
  skep-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: skep-frontend
    ports:
      - "80:80"
    environment:
      - API_BASE_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    networks:
      - skep-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  api-gateway:
    image: api-gateway:latest
    container_name: skep-api-gateway
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=skep_db
      - DB_USER=skep_user
      - DB_PASSWORD=secure_password
      - JWT_SECRET=your-secret-key-here
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - postgres
      - redis
    networks:
      - skep-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: skep-postgres
    environment:
      POSTGRES_DB: skep_db
      POSTGRES_USER: skep_user
      POSTGRES_PASSWORD: secure_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - skep-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skep_user -d skep_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skep-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - skep-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: pgAdmin for database management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: skep-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@skep.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - skep-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  skep-network:
    driver: bridge
